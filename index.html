<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My App Store</title>

<!-- Makes THIS store installable to the home screen on iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="App Store">
<meta name="theme-color" content="#0a0a0b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a0a0b;
    --surface:#141416;
    --surface-2:#1c1c1f;
    --line:#262629;
    --text:#f4f4f5;
    --muted:#7c7c84;
    --accent:#ff8a3d;        /* warm amber — your build, not Apple's */
    --accent-soft:#ff8a3d22;
    --blue:#3d9bff;          /* "Open" actions */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Spline Sans',sans-serif;
    min-height:100vh;
    padding:max(20px,env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
    background-image:
      radial-gradient(120% 80% at 50% -10%, #1a120c 0%, transparent 55%),
      radial-gradient(circle at 50% 0%, var(--accent-soft) 0%, transparent 40%);
    background-attachment:fixed;
  }
  header{text-align:center;padding:14px 0 22px;}
  header h1{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:800;
    font-size:26px;
    letter-spacing:-.02em;
  }
  header .build{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
  }
  .divider{height:1px;background:var(--line);max-width:560px;margin:0 auto;}
  .list{max-width:560px;margin:0 auto;}
  .app{
    display:flex;align-items:center;gap:15px;
    padding:18px 4px;
    border-bottom:1px solid var(--line);
    animation:rise .5s cubic-bezier(.2,.7,.2,1) backwards;
  }
  .app:last-child{border-bottom:none;}
  .icon{
    width:60px;height:60px;flex:0 0 60px;
    border-radius:15px;
    display:grid;place-items:center;
    font-size:30px;line-height:1;
    box-shadow:inset 0 0 0 1px #ffffff14, 0 6px 16px #0006;
  }
  .meta{flex:1;min-width:0;}
  .meta h2{font-size:19px;font-weight:600;letter-spacing:-.01em;}
  .meta .ver{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--muted);margin-top:3px;
  }
  .meta .date{font-size:12px;color:#5a5a61;margin-top:2px;}
  .btn{
    flex:0 0 auto;
    border:none;cursor:pointer;
    font-family:'Spline Sans',sans-serif;font-weight:600;font-size:14px;
    padding:8px 20px;border-radius:30px;
    transition:transform .12s ease, filter .12s ease;
    text-decoration:none;
  }
  .btn:active{transform:scale(.94);}
  .btn.open{background:#1d2a3a;color:var(--blue);}
  .btn.update{background:var(--accent);color:#1a0d04;}
  .btn.update:hover{filter:brightness(1.08);}
  footer{
    max-width:560px;margin:30px auto 0;
    text-align:center;color:#46464d;font-size:12px;line-height:1.6;
  }
  footer code{font-family:'JetBrains Mono',monospace;color:var(--muted);}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<header>
  <h1>My App Store</h1>
  <div class="build" id="build">Build 1</div>
</header>
<div class="divider"></div>

<main class="list" id="list"></main>

<footer>
  Install an app by opening it, then tapping <strong>Share → Add to Home Screen</strong>.<br>
  To add a new app, edit the <code>REGISTRY</code> array below and drop a folder in <code>/apps</code>.
</footer>

<script>
  /* ──────────────────────────────────────────────────────────
     THE REGISTRY — this is your store. One entry per app.
     Point Claude Code here: "add an app to the REGISTRY and
     scaffold its folder under /apps/<id>/".
     ────────────────────────────────────────────────────────── */
  const STORE_BUILD = 9;

  const REGISTRY = [
    {
      id: "notes",                    // folder name under /apps/
      name: "Quick Notes",
      version: "1.0",
      build: 4,
      updated: "2026-06-04",
      icon: "📝",
      bg: "linear-gradient(145deg,#ffb347,#ff7a00)",
      status: "open"                  // "open" or "update"
    },
    {
      id: "courage",
      name: "Daily Courage",
      version: "1.0",
      build: 2,
      updated: "2026-06-04",
      icon: "🔥",
      bg: "linear-gradient(145deg,#e8523a,#ff8a3d)",
      status: "open"
    },
    {
      id: "hoot",
      name: "Hoot",
      version: "1.0",
      build: 1,
      updated: "2026-06-04",
      icon: "🦉",
      bg: "linear-gradient(145deg,#7b5cff,#3a2d7a)",
      status: "open"
    },
    {
      id: "commonplace",
      name: "Commonplace",
      version: "1.1",
      build: 2,
      updated: "2026-06-05",
      icon: "📖",
      bg: "linear-gradient(145deg,#10b981,#064e3b)",
      status: "open"
    },
    {
      id: "bunnies",
      name: "Bunnies",
      version: "1.0",
      build: 2,
      updated: "2026-06-05",
      icon: "🐰",
      bg: "linear-gradient(145deg,#ffb3c6,#ffd6a8)",
      status: "open"
    },
    {
      id: "tarot",
      name: "Tarot",
      version: "1.1",
      build: 2,
      updated: "2026-06-05",
      icon: "🔮",
      bg: "linear-gradient(145deg,#4a2a7a,#1b1233)",
      status: "open"
    }
  ];

  /* ── render ── */
  document.getElementById('build').textContent = 'Build ' + STORE_BUILD;
  const list = document.getElementById('list');

  REGISTRY.forEach((app, i) => {
    const row = document.createElement('div');
    row.className = 'app';
    row.style.animationDelay = (i * 60) + 'ms';

    const isUpdate = app.status === 'update';
    const btnClass = isUpdate ? 'update' : 'open';
    const btnLabel = isUpdate ? 'Update' : 'Open';

    row.innerHTML = `
      <div class="icon" style="background:${app.bg}">${app.icon}</div>
      <div class="meta">
        <h2>${app.name}</h2>
        <div class="ver">v${app.version} · Build ${app.build}</div>
        <div class="date">${formatDate(app.updated)}</div>
      </div>
      <a class="btn ${btnClass}" href="apps/${app.id}/index.html">${btnLabel}</a>
    `;
    list.appendChild(row);
  });

  function formatDate(iso){
    if(!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
           ', ' + d.toTimeString().slice(0,5);
  }

  /* register the store's own service worker (no-ops if unsupported / file://) */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
